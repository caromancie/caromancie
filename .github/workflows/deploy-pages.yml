name: Déployer sur Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Déployer Pages
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Déployer sur Cloudflare Pages via Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # commande Wrangler: déploie le dossier `public` vers le projet Pages
          command: pages deploy public --project-name=caromancie --branch=main
        # Optionnel: activer GitHub Deployments
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
